<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#1e1f24" />
<title>Тренажер іспиту</title>
<style>
    :root {
        --bg: #1e1f24;
        --card: #2a2c33;
        --text: #eceef2;
        --muted: #9aa0aa;
        --accent: #4f8cff;
        --good: #3ecf8e;
        --bad: #ff5c5c;
        --border: #3a3d45;
    }
    * { box-sizing: border-box; }
    html, body { -webkit-text-size-adjust: 100%; }
    body {
        margin: 0;
        padding: 16px;
        padding-top: max(16px, env(safe-area-inset-top));
        padding-bottom: max(16px, env(safe-area-inset-bottom));
        padding-left: max(16px, env(safe-area-inset-left));
        padding-right: max(16px, env(safe-area-inset-right));
        font-family: -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        background: var(--bg); color: var(--text);
        display: flex; justify-content: center;
    }
    .app { width: 100%; max-width: 760px; }
    h1 { margin: 0 0 12px; font-size: 22px; }
    .stats {
        display: flex; gap: 16px; flex-wrap: wrap;
        background: var(--card); padding: 12px 16px; border-radius: 10px;
        border: 1px solid var(--border); margin-bottom: 16px;
        font-size: 14px; color: var(--muted);
    }
    .stats b { color: var(--text); }
    .progress-bar {
        height: 6px; background: #3a3d45; border-radius: 3px; overflow: hidden;
        flex: 1 1 100%; margin-top: 4px;
    }
    .progress-bar > div { height: 100%; background: var(--good); width: 0; transition: width .3s; }
    .card {
        background: var(--card); border: 1px solid var(--border);
        border-radius: 12px; padding: 20px; margin-bottom: 16px;
    }
    .qmeta { color: var(--muted); font-size: 13px; margin-bottom: 8px; }
    .qtext { font-size: 18px; line-height: 1.5; margin-bottom: 16px; }
    .options { display: flex; flex-direction: column; gap: 10px; }
    .opt {
        background: #34373f; border: 1px solid var(--border);
        color: var(--text); text-align: left; padding: 12px 14px;
        border-radius: 8px; cursor: pointer; font-size: 15px;
        transition: background .15s, border-color .15s;
        width: 100%;
        font-family: inherit;
        -webkit-tap-highlight-color: transparent;
    }
    .opt:hover:not(:disabled) { border-color: var(--accent); }
    .opt:disabled { cursor: default; opacity: 0.95; }
    .opt.answered { cursor: default; opacity: 0.95; }
    .opt.answered:hover { border-color: var(--border); }
    .opt.correct { background: rgba(62,207,142,.18); border-color: var(--good); }
    .opt.wrong   { background: rgba(255,92,92,.18);  border-color: var(--bad); }
    .feedback { margin-top: 14px; font-size: 14px; min-height: 20px; }
    .feedback.good { color: var(--good); }
    .feedback.bad  { color: var(--bad); }
    .actions { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
    button.action {
        background: var(--accent); color: white; border: 0;
        padding: 12px 16px; border-radius: 8px; cursor: pointer; font-size: 15px;
        font-family: inherit;
        -webkit-tap-highlight-color: transparent;
    }
    button.action:hover { filter: brightness(1.1); }
    button.action.next-btn {
        width: 100%;
        padding: 14px 16px;
        font-size: 16px;
        font-weight: 600;
    }
    .done {
        text-align: center; padding: 40px 20px; font-size: 18px; color: var(--good);
    }
    .hint { color: var(--muted); font-size: 12px; margin-top: 6px; }

    @media (max-width: 600px) {
        body { padding: 12px;
            padding-top: max(12px, env(safe-area-inset-top));
            padding-bottom: max(12px, env(safe-area-inset-bottom)); }
        h1 { font-size: 20px; }
        .card { padding: 16px; border-radius: 10px; }
        .qtext { font-size: 17px; }
        .opt { padding: 14px; font-size: 16px; }
        .stats { gap: 10px; padding: 10px 12px; font-size: 13px; }
        button.action { padding: 12px 14px; font-size: 15px; }
        button.action.next-btn { padding: 16px; font-size: 17px; }
        #topbar { gap: 6px; }
        #section-label { width: 100%; }
        #bottombar { gap: 6px; }
        #bottombar .action { flex: 1 1 auto; margin-left: 0 !important; }
    }
</style>
</head>
<body>
<div class="app">
    <h1>📚 Тренажер іспиту</h1>

    <div id="topbar" style="display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap;">
        <div id="section-label" style="color:var(--muted);font-size:14px;"></div>
    </div>

    <div class="stats" id="stats" style="display:none;"></div>

    <div id="container"></div>

    <div id="bottombar" style="display:flex;gap:8px;align-items:center;margin-top:16px;flex-wrap:wrap;">
        <button id="btn-change-section" class="action" style="display:none;">⟵ Обрати інший розділ</button>
        <button id="btn-reset-section" class="action" style="display:none;background:#5a5d66;margin-left:auto;">↺ Скинути прогрес розділу</button>
    </div>

    <p class="hint" id="hint">
        Прогрес автоматично зберігається у браузері після кожної відповіді.
    </p>
</div>

<style>
    .section-grid {
        display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 10px;
    }
    .section-btn {
        text-align: left; background: var(--card); color: var(--text);
        border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px;
        cursor: pointer; font-size: 15px; transition: border-color .15s, background .15s;
    }
    .section-btn:hover { border-color: var(--accent); }
    .section-btn .meta { color: var(--muted); font-size: 12px; margin-top: 4px; }
</style>

<script src="config.js"></script>
<script>
(function () {
    const cfg = (typeof CONFIG === "object" && CONFIG) ? CONFIG : {};
    const STORAGE_KEY_BASE = cfg.storageKey            || "exam-trainer-progress-v1";
    const DEFAULT_REQUIRED = cfg.requiredCorrect       || 2;
    const RESET_ON_WRONG   = cfg.resetStreakOnWrong !== false;
    const AVOID_REPEAT     = cfg.avoidImmediateRepeat !== false;
    const SECTIONS         = Array.isArray(cfg.sections) ? cfg.sections : [];
    const ACTIVE_SECTION_KEY = STORAGE_KEY_BASE + ":active-section";

    // Per-session state (set after a section is chosen)
    let activeSection = null;     // { id, folder, title, requiredCorrect }
    let REQUIRED_CORRECT = DEFAULT_REQUIRED;
    let STORAGE_KEY = STORAGE_KEY_BASE;
    let QUESTIONS = [];

    let progress = {};
    let current = null;
    let answered = false;
    let lastQuestionId = null;

    const $stats = document.getElementById("stats");
    const $container = document.getElementById("container");
    const $hint = document.getElementById("hint");
    const $sectionLabel = document.getElementById("section-label");
    const $btnChange = document.getElementById("btn-change-section");
    const $btnReset  = document.getElementById("btn-reset-section");

    $btnChange.onclick = () => {
        try { localStorage.removeItem(ACTIVE_SECTION_KEY); } catch {}
        location.reload();
    };
    $btnReset.onclick = () => {
        if (!activeSection) return;
        if (!confirm(`Скинути прогрес розділу "${activeSection.title}"?`)) return;
        progress = {};
        saveProgress();
        lastQuestionId = null;
        nextQuestion();
    };

    // Try to auto-resume the previously chosen section, otherwise show the picker.
    const remembered = (() => {
        try {
            const id = parseInt(localStorage.getItem(ACTIVE_SECTION_KEY), 10);
            return SECTIONS.find(s => s.id === id) || null;
        } catch { return null; }
    })();

    if (remembered) {
        startSection(remembered);
    } else {
        renderSectionPicker();
    }

    // ---------- section picker ----------

    function renderSectionPicker() {
        $stats.style.display = "none";
        $btnChange.style.display = "none";
        $btnReset.style.display = "none";
        $sectionLabel.textContent = "Оберіть розділ для тренування:";
        $hint.textContent = "Прогрес зберігається окремо для кожного розділу.";

        if (!SECTIONS.length) {
            $container.innerHTML = `<div class="card">У config.js не налаштовано жодного розділу</div>`;
            return;
        }

        const grid = document.createElement("div");
        grid.className = "section-grid";
        SECTIONS.forEach(sec => {
            const req = sec.requiredCorrect || DEFAULT_REQUIRED;
            const sectionKey = STORAGE_KEY_BASE + ":" + sec.id;
            let saved = {};
            try { saved = JSON.parse(localStorage.getItem(sectionKey) || "{}"); } catch {}
            const masteredCount = Object.values(saved).filter(s => s && s.mastered).length;

            const btn = document.createElement("button");
            btn.className = "section-btn";
            btn.innerHTML = `<div><b>${escapeHtml(sec.title)}</b></div>
                <div class="meta">потрібно: ${req}× · опановано: ${masteredCount}</div>`;
            btn.onclick = () => startSection(sec);
            grid.appendChild(btn);
        });

        $container.innerHTML = "";
        $container.appendChild(grid);
    }

    function startSection(sec) {
        activeSection = sec;
        REQUIRED_CORRECT = sec.requiredCorrect || DEFAULT_REQUIRED;
        STORAGE_KEY = STORAGE_KEY_BASE + ":" + sec.id;
        try { localStorage.setItem(ACTIVE_SECTION_KEY, String(sec.id)); } catch {}

        $sectionLabel.innerHTML = `Розділ: <b>${escapeHtml(sec.title)}</b> · потрібно правильно ${REQUIRED_CORRECT}×`;
        $btnChange.style.display = "inline-block";
        $btnReset.style.display = "inline-block";
        $stats.style.display = "flex";
        $hint.textContent = `Прогрес розділу зберігається у браузері (ключ: ${STORAGE_KEY}).`;
        $container.innerHTML = `<div class="card">Завантаження запитань…</div>`;

        loadSectionScript(sec)
            .then(qs => {
                QUESTIONS = qs;
                normalizeQuestions(QUESTIONS);
                progress = loadFromLocalStorage();
                lastQuestionId = null;
                nextQuestion();
            })
            .catch(err => {
                console.error(err);
                $container.innerHTML = `<div class="card">Не вдалося завантажити <code>${escapeHtml(sec.folder)}/questions.js</code>: ${escapeHtml(err.message || String(err))}</div>`;
            });
    }

    // Each section file declares `const QUESTIONS = [...]`. To allow loading
    // any section without polluting the global once-per-page-load, we fetch
    // the file as text and evaluate it inside an isolated function scope.
    // Falls back to <script> injection for the very first load if fetch fails
    // (e.g. opening index.html via file:// without a local server).
    function loadSectionScript(sec) {
        const url = sec.folder + "/questions.js";
        return fetch(url)
            .then(r => {
                if (!r.ok) throw new Error("HTTP " + r.status);
                return r.text();
            })
            .then(src => {
                // Evaluate in an isolated scope and return the QUESTIONS const.
                const fn = new Function(src + "\n;return (typeof QUESTIONS !== 'undefined') ? QUESTIONS : [];");
                const qs = fn();
                if (!Array.isArray(qs) || qs.length === 0) throw new Error("QUESTIONS array is empty or missing");
                return qs;
            })
            .catch(err => {
                // Fallback: inject as <script> (works on file://). This pollutes
                // the global `QUESTIONS` and only works for the first section
                // chosen on this page load.
                if (window.__sectionLoadedOnce__) {
                    throw new Error(
                        "Неможливо завантажити інший розділ без локального веб-сервера " +
                        "(file:// блокує fetch). Перезавантажте сторінку, щоб обрати інший розділ."
                    );
                }
                return new Promise((resolve, reject) => {
                    const s = document.createElement("script");
                    s.src = url;
                    s.onload = () => {
                        window.__sectionLoadedOnce__ = true;
                        // Section files use `const QUESTIONS = [...]`. Top-level
                        // `const` is a global lexical binding (not a property of
                        // window), so look it up by bare identifier via eval.
                        let qs;
                        try {
                            qs = (0, eval)("typeof QUESTIONS !== 'undefined' ? QUESTIONS : undefined");
                        } catch (_) { qs = undefined; }
                        if (qs === undefined && typeof window.QUESTIONS !== "undefined") {
                            qs = window.QUESTIONS;
                        }
                        if (Array.isArray(qs) && qs.length) {
                            resolve(qs.slice());
                        } else {
                            reject(new Error("QUESTIONS not defined after loading " + url));
                        }
                    };
                    s.onerror = () => reject(new Error("Не вдалося підключити " + url));
                    document.head.appendChild(s);
                });
            });
    }

    function normalizeQuestions(list) {
        list.forEach(q => {
            const flagged = q.options.findIndex(o => typeof o === "string" && o.startsWith("!"));
            if (flagged >= 0) q.answer = flagged;
            if (typeof q.answer !== "number") q.answer = 0;
            q.options = q.options.map(o => (typeof o === "string" && o.startsWith("!")) ? o.slice(1) : o);
        });
    }

    // ---------- core ----------

    function getStat(id) {
        return progress[id] || { correct: 0, wrong: 0, mastered: false };
    }

    function pendingQuestions() {
        return QUESTIONS.filter(q => !getStat(q.id).mastered);
    }

    function nextQuestion() {
        renderStats();
        const pending = pendingQuestions();
        if (pending.length === 0) {
            $container.innerHTML = `<div class="card done">🎉 Розділ опановано!<br><br>
                <button class="action" id="btn-restart-sec">Пройти ще раз</button></div>`;
            document.getElementById("btn-restart-sec").onclick = () => {
                progress = {};
                saveProgress();
                lastQuestionId = null;
                nextQuestion();
            };
            return;
        }
        let pool = pending;
        if (AVOID_REPEAT && pool.length > 1 && lastQuestionId != null) {
            const filtered = pool.filter(q => q.id !== lastQuestionId);
            if (filtered.length > 0) pool = filtered;
        }
        const weights = pool.map(q => {
            const s = getStat(q.id);
            return Math.max(1, REQUIRED_CORRECT - s.correct);
        });
        current = weightedPick(pool, weights);
        lastQuestionId = current.id;
        answered = false;
        renderQuestion();
    }

    function weightedPick(items, weights) {
        const total = weights.reduce((a, b) => a + b, 0);
        let r = Math.random() * total;
        for (let i = 0; i < items.length; i++) {
            r -= weights[i];
            if (r <= 0) return items[i];
        }
        return items[items.length - 1];
    }

    function renderQuestion() {
        const s = getStat(current.id);
        $container.innerHTML = `
            <div class="card">
                <div class="qmeta">Питання №${current.id} · правильно ${s.correct}/${REQUIRED_CORRECT} · помилок ${s.wrong}</div>
                <div class="qtext"></div>
                <div class="options"></div>
                <div class="feedback" id="feedback"></div>
                <div class="actions" id="actions"></div>
            </div>
        `;
        $container.querySelector(".qtext").textContent = current.q;

        const $opts = $container.querySelector(".options");
        current.options.forEach((opt, idx) => {
            const btn = document.createElement("button");
            btn.className = "opt";
            btn.textContent = opt;
            btn.onclick = () => onAnswer(idx);
            $opts.appendChild(btn);
        });
    }

    function onAnswer(idx) {
        if (answered) { nextQuestion(); return; }
        answered = true;

        const correctIdx = current.answer;
        const stat = getStat(current.id);
        const $feedback = document.getElementById("feedback");
        const $actions = document.getElementById("actions");
        const optButtons = $container.querySelectorAll(".opt");

        optButtons.forEach((b, i) => {
            b.disabled = true;
            if (i === correctIdx) b.classList.add("correct");
            if (i === idx && idx !== correctIdx) b.classList.add("wrong");
        });

        if (idx === correctIdx) {
            stat.correct += 1;
            if (stat.correct >= REQUIRED_CORRECT) stat.mastered = true;
            $feedback.className = "feedback good";
            $feedback.textContent = stat.mastered
                ? `✅ Правильно! Опановано (${stat.correct}/${REQUIRED_CORRECT}) — вилучено з ротації.`
                : `✅ Правильно! (${stat.correct}/${REQUIRED_CORRECT})`;
        } else {
            stat.wrong += 1;
            if (RESET_ON_WRONG) {
                stat.correct = 0;
                stat.mastered = false;
            }
            $feedback.className = "feedback bad";
            $feedback.innerHTML = `❌ Неправильно. Правильна відповідь: <b>${escapeHtml(current.options[correctIdx])}</b>`
                + (RESET_ON_WRONG ? ". Лічильник правильних скинуто до 0." : ".");
        }
        progress[current.id] = stat;
        saveProgress();
        renderStats();

        const nextBtn = document.createElement("button");
        nextBtn.className = "action next-btn";
        nextBtn.textContent = "Наступне питання →";
        nextBtn.onclick = nextQuestion;
        $actions.appendChild(nextBtn);
        nextBtn.focus();
    }

    function renderStats() {
        const total = QUESTIONS.length;
        const mastered = QUESTIONS.filter(q => getStat(q.id).mastered).length;
        const seen = QUESTIONS.filter(q => {
            const s = getStat(q.id);
            return s.correct > 0 || s.wrong > 0;
        }).length;
        const pct = total ? Math.round((mastered / total) * 100) : 0;
        $stats.innerHTML = `
            <div>Опановано: <b>${mastered}</b> / ${total}</div>
            <div>Переглянуто: <b>${seen}</b></div>
            <div>Залишилось: <b>${total - mastered}</b></div>
            <div style="margin-left:auto;">Прогрес: <b>${pct}%</b></div>
            <div class="progress-bar"><div style="width:${pct}%"></div></div>
        `;
    }

    // ---------- persistence ----------

    function loadFromLocalStorage() {
        try {
            const raw = localStorage.getItem(STORAGE_KEY);
            return raw ? JSON.parse(raw) : {};
        } catch (e) {
            console.warn("Failed to load progress:", e);
            return {};
        }
    }
    function saveProgress() {
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(progress)); }
        catch (e) { console.warn("localStorage save failed:", e); }
    }

    function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, c => ({
            "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
        }[c]));
    }
})();
</script>
</body>
</html>
